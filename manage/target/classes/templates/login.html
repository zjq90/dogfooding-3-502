<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城管理系统 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .login-title h2 {
            font-weight: 600;
            margin-bottom: 10px;
        }
        .login-title p {
            color: #666;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-control {
            height: 50px;
            border-radius: 8px;
            border: 1px solid #e1e5ea;
            padding-left: 45px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        .btn-login {
            width: 100%;
            height: 50px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-title">
                <h2><i class="fa fa-shopping-cart"></i> 商城管理系统</h2>
                <p>请输入您的账号密码登录系统</p>
            </div>
            <form id="loginForm">
                <div class="form-group position-relative">
                    <i class="fa fa-user input-icon"></i>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" value="admin">
                </div>
                <div class="form-group position-relative">
                    <i class="fa fa-lock input-icon"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" value="123456">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-login">
                        <i class="fa fa-sign-in"></i> 登 录
                    </button>
                </div>
                <div class="error-message" id="errorMessage"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                var username = $('#username').val();
                var password = $('#password').val();
                
                if (!username || !password) {
                    $('#errorMessage').text('请输入用户名和密码').show();
                    return;
                }
                
                $.ajax({
                    url: '/mall/login',
                    type: 'POST',
                    data: {
                        username: username,
                        password: password
                    },
                    success: function(res) {
                        if (res.code === 200) {
                            window.location.href = '/mall/dashboard';
                        } else {
                            $('#errorMessage').text(res.message).show();
                        }
                    },
                    error: function() {
                        $('#errorMessage').text('服务器错误，请稍后重试').show();
                    }
                });
            });
        });
    </script>
</body>
</html>
