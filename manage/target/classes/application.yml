server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mall-management

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:mapper/*Mapper.xml
  type-aliases-package: com.mall.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.mall: debug
    org.springframework: info

# 文件上传配置
file:
  upload:
    path: ./uploads
    url: /uploads

# JWT配置
jwt:
  secret: mall-management-jwt-secret-key-2024
  expiration: 86400000