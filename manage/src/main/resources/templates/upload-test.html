<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传测试</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            padding: 50px;
            background-color: #f5f7fa;
        }
        .upload-area {
            border: 2px dashed #ddd;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area i {
            font-size: 48px;
            color: #999;
            margin-bottom: 10px;
        }
        .image-preview {
            max-width: 300px;
            max-height: 300px;
            display: none;
            margin-top: 20px;
            border-radius: 8px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4"><i class="fa fa-upload"></i> 图片上传测试</h2>
                <div class="card">
                    <div class="card-body">
                        <div class="upload-area" onclick="$('#fileInput').click()">
                            <i class="fa fa-cloud-upload"></i>
                            <p>点击上传图片</p>
                            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
                        </div>
                        <img id="imagePreview" class="image-preview mx-auto d-block" src="" alt="预览">
                        <div id="result" class="result"></div>
                        <div class="mt-3 text-center">
                            <button class="btn btn-primary mr-2" onclick="$('#fileInput').click()">
                                <i class="fa fa-file-image-o"></i> 选择图片
                            </button>
                            <a href="/mall/dashboard" class="btn btn-secondary">
                                <i class="fa fa-home"></i> 返回首页
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>测试说明</h5>
                    </div>
                    <div class="card-body">
                        <ul>
                            <li>支持的图片格式：JPG、PNG、GIF、BMP</li>
                            <li>最大文件大小：10MB</li>
                            <li>上传成功后会显示图片预览和访问URL</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function uploadImage(input) {
            var file = input.files[0];
            if (!file) return;
            
            // 预览图片
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#imagePreview').attr('src', e.target.result).show();
            };
            reader.readAsDataURL(file);
            
            // 验证文件大小（不超过10MB）
            if (file.size > 10 * 1024 * 1024) {
                showResult('error', '文件大小不能超过10MB');
                return;
            }
            
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showResult('error', '请选择图片文件');
                return;
            }
            
            var formData = new FormData();
            formData.append('file', file);
            
            $.ajax({
                url: '/mall/product/upload',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function(res) {
                    if (res.code === 200) {
                        showResult('success', '上传成功！图片URL: ' + res.data);
                    } else {
                        showResult('error', '上传失败: ' + res.message);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('上传错误:', xhr);
                    var msg = '上传失败';
                    if (xhr.status === 404) {
                        msg = '上传接口不存在，请检查服务器是否启动';
                    } else if (xhr.status === 401 || xhr.status === 403) {
                        msg = '请先登录';
                    } else if (xhr.responseText) {
                        msg = '上传失败: ' + xhr.responseText.substring(0, 100);
                    }
                    showResult('error', msg);
                }
            });
        }
        
        function showResult(type, message) {
            $('#result').removeClass('success error')
                        .addClass(type)
                        .text(message)
                        .show();
        }
    </script>
</body>
</html>
